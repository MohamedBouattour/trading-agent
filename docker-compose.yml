services:
  trading-bot:
    build: ./services/trading-bot
    container_name: trading-bot
    restart: unless-stopped
    environment:
      - TICKER=BTCUSDT
      - LEVERAGE=5
      - TRADE_USDT=100
      - RESULTS_DIR=/app/results
    volumes:
      - ./results:/app/results
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

  webapp:
    build: ./services/webapp
    container_name: trading-webapp
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - RESULTS_DIR=/app/results
    volumes:
      - ./results:/app/results
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"
