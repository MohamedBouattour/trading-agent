services:
  webapp:
    image: devmed555/trading-webapp:latest
    container_name: trading-webapp
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      - RESULTS_DIR=/app/results
    volumes:
      - ./results:/app/results
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"
